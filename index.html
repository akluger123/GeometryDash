<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash Clone</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #222;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }
        canvas {
            display: block;
            background: linear-gradient(#1a2a6c, #b21f1f, #fdbb2d);
        }
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            z-index: 10;
        }
        h1 { font-size: 64px; margin-bottom: 20px; text-shadow: 0 0 20px #00f2ff; }
        .btn {
            background: #00f2ff;
            color: black;
            border: none;
            padding: 15px 40px;
            font-size: 24px;
            margin: 10px;
            cursor: pointer;
            border-radius: 5px;
            font-weight: bold;
            transition: transform 0.2s;
        }
        .btn:hover { transform: scale(1.1); background: #fff; }
        
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            font-size: 24px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
            pointer-events: none;
            display: none;
        }

        .custom-panel {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .color-opt {
            width: 40px;
            height: 40px;
            cursor: pointer;
            border: 3px solid white;
        }
    </style>
</head>
<body>
    <div id="ui">Score: 0 | Level: <span id="lvlDisplay">1</span></div>

    <!-- Main Menu -->
    <div id="mainMenu" class="overlay">
        <h1>GEOMETRY JS</h1>
        <div class="custom-panel" id="colorPicker">
            <!-- Colors generated by JS -->
        </div>
        <button class="btn" onclick="startGame('Easy')">EASY</button>
        <button class="btn" onclick="startGame('Normal')">NORMAL</button>
        <button class="btn" onclick="startGame('Hard')">HARDCORE</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const ui = document.getElementById('ui');
        const mainMenu = document.getElementById('mainMenu');

        // Game State
        const GRAVITY = 0.8;
        const JUMP_FORCE = -13;
        const GROUND_HEIGHT = 100;
        const PLAYER_SIZE = 45;
        
        let gameState = 'MENU';
        let score = 0;
        let difficulty = { speed: 8, interval: 70 };
        let playerColor = '#f0f';

        const player = {
            x: 150,
            y: 0,
            width: PLAYER_SIZE,
            height: PLAYER_SIZE,
            dy: 0,
            rotation: 0
        };

        let obstacles = [];
        let frameCount = 0;

        // Character Customization
        const colors = ['#f0f', '#0ff', '#ff0', '#0f0', '#f00', '#fff'];
        const picker = document.getElementById('colorPicker');
        colors.forEach(c => {
            const div = document.createElement('div');
            div.className = 'color-opt';
            div.style.backgroundColor = c;
            div.onclick = () => {
                playerColor = c;
                document.querySelectorAll('.color-opt').forEach(el => el.style.borderColor = 'white');
                div.style.borderColor = '#000';
            };
            picker.appendChild(div);
        });

        function resize() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener('resize', resize);
        resize();

        function startGame(mode) {
            if (mode === 'Easy') difficulty = { speed: 7, interval: 90 };
            if (mode === 'Normal') difficulty = { speed: 10, interval: 65 };
            if (mode === 'Hard') difficulty = { speed: 14, interval: 45 };

            gameState = 'PLAYING';
            score = 0;
            obstacles = [];
            frameCount = 0;
            player.y = canvas.height - GROUND_HEIGHT - PLAYER_SIZE;
            player.dy = 0;
            player.rotation = 0;
            
            mainMenu.style.display = 'none';
            ui.style.display = 'block';
            document.getElementById('lvlDisplay').innerText = mode;
            
            gameLoop();
        }

        function handleJump() {
            if (gameState !== 'PLAYING') return;
            if (player.y >= canvas.height - GROUND_HEIGHT - PLAYER_SIZE) {
                player.dy = JUMP_FORCE;
            }
        }

        window.addEventListener('keydown', (e) => { if (e.code === 'Space' || e.code === 'ArrowUp') handleJump(); });
        window.addEventListener('mousedown', handleJump);

        function spawnObstacle() {
            const size = 40 + Math.random() * 20;
            obstacles.push({
                x: canvas.width,
                y: canvas.height - GROUND_HEIGHT - size,
                width: size,
                height: size
            });
        }

        function update() {
            if (gameState !== 'PLAYING') return;

            player.dy += GRAVITY;
            player.y += player.dy;

            if (player.y > canvas.height - GROUND_HEIGHT - PLAYER_SIZE) {
                player.y = canvas.height - GROUND_HEIGHT - PLAYER_SIZE;
                player.dy = 0;
                player.rotation = Math.round(player.rotation / 90) * 90;
            } else {
                player.rotation += 5;
            }

            if (frameCount % difficulty.interval === 0) spawnObstacle();
            
            for (let i = obstacles.length - 1; i >= 0; i--) {
                let obs = obstacles[i];
                obs.x -= difficulty.speed;

                // Hitbox detection
                const p = 8; // padding
                if (player.x + p < obs.x + obs.width - p &&
                    player.x + player.width - p > obs.x + p &&
                    player.y + p < obs.y + obs.height - p &&
                    player.y + player.height - p > obs.y + p) {
                    gameOver();
                }

                if (obs.x + obs.width < 0) {
                    obstacles.splice(i, 1);
                    score++;
                    document.getElementById('ui').innerHTML = `Score: ${score} | Level: <span id="lvlDisplay">${document.getElementById('lvlDisplay').innerText}</span>`;
                }
            }
            frameCount++;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Ground
            ctx.fillStyle = '#111';
            ctx.fillRect(0, canvas.height - GROUND_HEIGHT, canvas.width, GROUND_HEIGHT);
            ctx.strokeStyle = '#00f2ff';
            ctx.lineWidth = 4;
            ctx.strokeRect(0, canvas.height - GROUND_HEIGHT, canvas.width, 4);

            // Player
            ctx.save();
            ctx.translate(player.x + player.width/2, player.y + player.height/2);
            ctx.rotate(player.rotation * Math.PI / 180);
            ctx.fillStyle = playerColor;
            ctx.fillRect(-player.width/2, -player.height/2, player.width, player.height);
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 3;
            ctx.strokeRect(-player.width/2, -player.height/2, player.width, player.height);
            // Face
            ctx.fillStyle = 'white';
            ctx.fillRect(8, -12, 8, 8);
            ctx.fillRect(8, 4, 8, 8);
            ctx.restore();

            // Spikes
            ctx.fillStyle = '#ff3333';
            ctx.strokeStyle = 'white';
            ctx.lineWidth = 2;
            obstacles.forEach(obs => {
                ctx.beginPath();
                ctx.moveTo(obs.x, obs.y + obs.height);
                ctx.lineTo(obs.x + obs.width / 2, obs.y);
                ctx.lineTo(obs.x + obs.width, obs.y + obs.height);
                ctx.closePath();
                ctx.fill();
                ctx.stroke();
            });
        }

        function gameLoop() {
            if (gameState !== 'PLAYING') return;
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            gameState = 'MENU';
            mainMenu.style.display = 'flex';
            ui.style.display = 'none';
            alert(`Game Over! Final Score: ${score}`);
        }

        // Initialize background
        draw();
    </script>
</body>
</html>
