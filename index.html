<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geometry Dash Clone</title>
    <style>
        body { margin: 0; overflow: hidden; background-color: #222; font-family: 'Arial', sans-serif; }
        canvas { display: block; background: linear-gradient(#1e3c72, #2a5298); }
        #ui {
            position: absolute; top: 10px; left: 10px; color: white; 
            text-shadow: 2px 2px 4px #000; font-size: 20px; pointer-events: none;
        }
        #shop-btn {
            position: absolute; top: 10px; right: 10px; padding: 10px 20px;
            background: #f1c40f; border: none; cursor: pointer; font-weight: bold; border-radius: 5px;
        }
        #shop-modal {
            display: none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
            background: rgba(0,0,0,0.9); padding: 20px; border: 2px solid white; color: white; text-align: center;
            border-radius: 10px; min-width: 300px;
        }
        .skin-option {
            display: inline-block; margin: 10px; padding: 10px; border: 1px solid #555; cursor: pointer;
        }
        .skin-option:hover { background: #333; }
        .locked { opacity: 0.5; }
    </style>
</head>
<body>

    <div id="ui">Score: 0 | Coins: <span id="coin-count">0</span></div>
    <button id="shop-btn" onclick="toggleShop()">SHOP</button>

    <div id="shop-modal">
        <h2>SKIN SHOP</h2>
        <div id="skin-list">
            <div class="skin-option" onclick="buySkin('cube', 0)">Cube (Free)</div>
            <div class="skin-option" onclick="buySkin('ball', 5)">Ball (5 Coins)</div>
            <div class="skin-option" onclick="buySkin('ufo', 15)">UFO (15 Coins)</div>
        </div>
        <br>
        <button onclick="toggleShop()">Close</button>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- Geometry Dash style placeholder music (Standard web audio doesn't need external files if we use Synth, but here is the logic for audio) -->
    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");

        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        // Game Variables
        let gravity = 0.8;
        let score = 0;
        let coins = parseInt(localStorage.getItem('gd_coins')) || 0;
        let unlockedSkins = JSON.parse(localStorage.getItem('gd_skins')) || ['cube'];
        let isGameOver = false;

        const player = {
            x: 100,
            y: canvas.height - 100,
            width: 40,
            height: 40,
            color: "#00ff00",
            dy: 0,
            jumpForce: -15,
            grounded: false,
            rotation: 0,
            type: 'cube'
        };

        const obstacles = [];
        const items = []; // For coins
        let gameSpeed = 7;

        // UI Update
        function updateUI() {
            document.getElementById('coin-count').innerText = coins;
        }
        updateUI();

        // Audio setup (using oscillator for "retro" sound to avoid broken links)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playJumpSound() {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.type = 'square'; osc.frequency.setValueAtTime(150, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(40, audioCtx.currentTime + 0.1);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            osc.start(); osc.stop(audioCtx.currentTime + 0.1);
        }

        function toggleShop() {
            const modal = document.getElementById('shop-modal');
            modal.style.display = modal.style.display === 'block' ? 'none' : 'block';
        }

        function buySkin(type, cost) {
            if (unlockedSkins.includes(type)) {
                player.type = type;
                player.color = type === 'ball' ? '#ff00ff' : (type === 'ufo' ? '#00ffff' : '#00ff00');
                toggleShop();
            } else if (coins >= cost) {
                coins -= cost;
                unlockedSkins.push(type);
                localStorage.setItem('gd_coins', coins);
                localStorage.setItem('gd_skins', JSON.stringify(unlockedSkins));
                player.type = type;
                updateUI();
                alert("Skin Unlocked!");
                toggleShop();
            } else {
                alert("Not enough coins!");
            }
        }

        function createObstacle() {
            const height = 30 + Math.random() * 40;
            obstacles.push({ x: canvas.width, y: canvas.height - height, w: 30, h: height });
        }

        function createCoin() {
            if (Math.random() < 0.01) { // Rare spawn
                items.push({ x: canvas.width, y: canvas.height - 100, w: 20, h: 20, collected: false });
            }
        }

        function update() {
            if (isGameOver) return;

            // Physics
            player.dy += gravity;
            player.y += player.dy;

            if (player.y + player.height > canvas.height) {
                player.y = canvas.height - player.height;
                player.dy = 0;
                player.grounded = true;
            } else {
                player.grounded = false;
            }

            // Rotation
            if (!player.grounded) {
                player.rotation += 0.15;
            } else {
                player.rotation = Math.round(player.rotation / (Math.PI/2)) * (Math.PI/2);
            }

            // Obstacles
            if (Math.random() < 0.02) createObstacle();
            createCoin();

            for (let i = obstacles.length - 1; i >= 0; i--) {
                obstacles[i].x -= gameSpeed;
                
                // Collision
                if (player.x < obstacles[i].x + obstacles[i].w &&
                    player.x + player.width > obstacles[i].x &&
                    player.y < obstacles[i].y + obstacles[i].h &&
                    player.y + player.height > obstacles[i].y) {
                    gameOver();
                }

                if (obstacles[i].x + obstacles[i].w < 0) obstacles.splice(i, 1);
            }

            // Coins logic
            for (let i = items.length - 1; i >= 0; i--) {
                items[i].x -= gameSpeed;
                if (player.x < items[i].x + items[i].w && 
                    player.x + player.width > items[i].x && 
                    player.y < items[i].y + items[i].h && 
                    player.y + player.height > items[i].y) {
                    coins++;
                    updateUI();
                    localStorage.setItem('gd_coins', coins);
                    items.splice(i, 1);
                } else if (items[i].x < 0) {
                    items.splice(i, 1);
                }
            }

            score++;
            gameSpeed += 0.001;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Draw Player
            ctx.save();
            ctx.translate(player.x + player.width/2, player.y + player.height/2);
            ctx.rotate(player.rotation);
            ctx.fillStyle = player.color;
            if (player.type === 'ball') {
                ctx.beginPath();
                ctx.arc(0, 0, player.width/2, 0, Math.PI*2);
                ctx.fill();
            } else {
                ctx.fillRect(-player.width/2, -player.height/2, player.width, player.height);
                ctx.strokeStyle = "white";
                ctx.strokeRect(-player.width/2, -player.height/2, player.width, player.height);
            }
            ctx.restore();

            // Draw Obstacles (Spikes)
            ctx.fillStyle = "#ff4444";
            obstacles.forEach(obs => {
                ctx.beginPath();
                ctx.moveTo(obs.x, obs.y + obs.h);
                ctx.lineTo(obs.x + obs.w / 2, obs.y);
                ctx.lineTo(obs.x + obs.w, obs.y + obs.h);
                ctx.fill();
            });

            // Draw Coins
            ctx.fillStyle = "#f1c40f";
            items.forEach(c => {
                ctx.beginPath();
                ctx.arc(c.x + 10, c.y + 10, 10, 0, Math.PI*2);
                ctx.fill();
                ctx.strokeStyle = "white";
                ctx.stroke();
            });
        }

        function gameLoop() {
            update();
            draw();
            requestAnimationFrame(gameLoop);
        }

        function gameOver() {
            isGameOver = true;
            alert("Game Over! Score: " + score);
            location.reload();
        }

        window.addEventListener("keydown", (e) => {
            if (e.code === "Space" && (player.grounded || player.type === 'ufo')) {
                player.dy = player.jumpForce;
                playJumpSound();
                if(audioCtx.state === 'suspended') audioCtx.resume();
            }
        });

        gameLoop();
    </script>
</body>
</html>
